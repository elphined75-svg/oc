<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OC World Simulator v2.0</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>OC World Simulator <span>v2.1</span></h1>
      <p>자캐 생성 · 관계도 · 감정 · 호감도 · 자동 대화</p>
    </div>
    <div class="top-actions">
      <button id="btnExport">저장파일 내보내기</button>
      <label class="file-btn">불러오기<input id="importFile" type="file" accept="application/json" hidden></label>
      <button id="btnReset" class="danger">전체 초기화</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel left">
      <h2>캐릭터 만들기</h2>
      <div class="form-grid">
        <input id="name" placeholder="이름" />
        <input id="age" placeholder="나이/학년" />
        <input id="trait" placeholder="성격 키워드 예: 차분함, 츤데레" />
        <input id="like" placeholder="좋아하는 것" />
        <input id="dislike" placeholder="싫어하는 것" />
        <input id="catchphrase" placeholder="말버릇" />
        <textarea id="bio" placeholder="간단한 설정/배경"></textarea>
        <input id="photo" type="file" accept="image/*" />
        <button id="btnAdd">캐릭터 추가</button>
      </div>

      <h2>관계 만들기</h2>
      <select id="charA"></select>
      <select id="charB"></select>
      <select id="relType">
        <option>친구</option><option>소꿉친구</option><option>라이벌</option><option>가족</option>
        <option>연인</option><option>짝사랑</option><option>스승/제자</option><option>적대</option><option>비밀 관계</option>
      </select>
      <input id="relMemo" placeholder="관계 설명" />
      <button id="btnRel">관계 추가</button>
      <p class="hint">캐릭터 카드를 클릭하면 선택됩니다. 2명 선택 후 관계 추가도 가능합니다.</p>

      <h2>관계 목록/삭제</h2>
      <div id="relManager" class="rel-manager empty">아직 관계가 없습니다.</div>
    </section>

    <section class="center">
      <div class="worldbar">
        <div>날짜 <b id="day">1</b>일차 · 시간 <b id="timeSlot">아침</b></div>
        <div class="world-actions">
          <button id="btnNext">시간 진행</button>
          <button id="btnEvent">랜덤 사건</button>
          <button id="btnTalk">자동 대화 1회</button>
          <button id="btnAuto">자동 진행 시작</button>
        </div>
      </div>
      <div id="canvas" class="canvas">
        <svg id="svg"></svg>
      </div>
    </section>

    <section class="panel right">
      <h2>선택 캐릭터</h2>
      <div id="detail" class="detail empty">캐릭터를 선택하세요.</div>
      <h2>스토리 로그</h2>
      <div id="log" class="log"></div>
    </section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <button class="x">×</button>
      <div class="avatar"></div>
      <h3></h3>
      <p class="sub"></p>
      <div class="mood"></div>
      <div class="bars"></div>
    </article>
  </template>

  <script src="js/app.js"></script>
</body>
</html>
